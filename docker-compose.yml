services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aira
      POSTGRES_USER: aira
      POSTGRES_PASSWORD: aira
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aira -d aira"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [aira]

  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks: [aira]

volumes:
  postgres_data:

networks:
  aira:
    driver: bridge
